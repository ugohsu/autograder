<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}答案採点支援{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<button type="button" class="menu-toggle" aria-label="メニュー">&#9776;</button>
<div class="app">
  <div class="backdrop"></div>
  <aside class="sidebar">
    <a class="brand" href="{{ url_for('upload.index') }}">
      <span class="brand-dot"></span> 答案採点支援
    </a>
    <nav class="side-nav">
      <a class="side-link {{ 'active' if request.endpoint == 'upload.index' or request.endpoint.startswith('batch.') or request.endpoint.startswith('answer_key.') or request.endpoint.startswith('roster_import.') else '' }}"
         href="{{ url_for('upload.index') }}">答案読み取り・採点</a>
      <a class="side-link {{ 'active' if request.endpoint.startswith('answersheet.') else '' }}"
         href="{{ url_for('answersheet.list_answersheets') }}">解答用紙編集・ダウンロード</a>
    </nav>
  </aside>
  <main class="main">
    <div class="content-inner">
      {% block content %}{% endblock %}
    </div>
  </main>
</div>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
